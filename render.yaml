services:
  # Backend service
  - type: web
    name: expense-tracker-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString
      - key: USE_SQLITE
        value: "False"

  # Frontend service
  - type: web
    name: expense-tracker-frontend
    env: docker
    dockerContext: .
    dockerfilePath: frontend/Dockerfile
    plan: free
    buildArgs:
      - key: VITE_API_URL
        value: https://expense-tracker-backend-061f.onrender.com

databases:
  - name: expense-db
    plan: free
